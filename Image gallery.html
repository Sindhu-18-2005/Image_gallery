<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image gallery</title>
    <link rel="stylesheet" href="style2.css">
    
</head>
<body>
 <h1>Image Gallery</h1>
  <div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="https://picsum.photos/id/1015/300/200" class="image nature" onclick="openLightbox(this)">
  <img src="https://picsum.photos/id/1011/300/200" class="image city" onclick="openLightbox(this)">
  <img src="https://picsum.photos/id/984/300/200" class="image nature" onclick="openLightbox(this)">
  <img src="https://picsum.photos/id/1020/300/200" class="image city" onclick="openLightbox(this)">
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
  <span class="close" onclick="closeLightbox()">&times;</span>
  <img id="lightbox-img">
  <div class="controls">
    <button onclick="prevImage()">Prev</button>
    <button onclick="nextImage()">Next</button>
  </div>
</div>

<script src="script.js"></script>  
</body>
</html>
